<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>招商驾驶舱 v1.1.0</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        color: #d7e8f4;
        background: #0b1720;
        font-family: "PingFang SC", system-ui, sans-serif;
      }
      .dashboard {
        min-height: 100vh;
        padding: 28px;
        background:
          radial-gradient(circle at 70% 18%, rgba(53, 139, 187, 0.26), transparent 34%),
          linear-gradient(135deg, #0b1720 0%, #102735 100%);
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 22px;
      }
      h1 { margin: 0; font-size: 30px; letter-spacing: 0; }
      .time { color: #8fb0c0; font-size: 14px; }
      .metrics {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
        margin-bottom: 16px;
      }
      .card {
        border: 1px solid rgba(143, 176, 192, 0.28);
        border-radius: 10px;
        background: rgba(16, 39, 53, 0.72);
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.18);
      }
      .metric { padding: 18px; }
      .metric span { display: block; color: #8fb0c0; font-size: 13px; }
      .metric strong { display: block; margin-top: 10px; color: #f3fbff; font-size: 30px; }
      .grid {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 16px;
      }
      .panel { min-height: 260px; padding: 18px; }
      .panel h2 { margin: 0 0 16px; font-size: 17px; }
      .bars { display: grid; gap: 13px; }
      .bar-row { display: grid; grid-template-columns: 86px 1fr 52px; gap: 12px; align-items: center; }
      .bar-bg { height: 10px; overflow: hidden; border-radius: 999px; background: rgba(143, 176, 192, 0.16); }
      .bar { height: 100%; border-radius: inherit; background: linear-gradient(90deg, #3bb7e8, #7cc6a4); }
      .project-list { display: grid; gap: 10px; }
      .project {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.05);
      }
      .project small { color: #8fb0c0; }
    </style>
  </head>
  <body>
    <main class="dashboard">
      <header class="header">
        <h1>招商驾驶舱</h1>
        <div class="time">v1.1.0 · 2026-06-12</div>
      </header>
      <section class="metrics">
        <div class="card metric"><span>招商线索</span><strong>328</strong></div>
        <div class="card metric"><span>在谈项目</span><strong>76</strong></div>
        <div class="card metric"><span>签约金额</span><strong>126.8亿</strong></div>
        <div class="card metric"><span>落地率</span><strong>42%</strong></div>
      </section>
      <section class="grid">
        <div class="card panel">
          <h2>区域项目转化</h2>
          <div class="bars">
            <div class="bar-row"><span>高新区</span><div class="bar-bg"><div class="bar" style="width: 88%"></div></div><strong>88%</strong></div>
            <div class="bar-row"><span>经开区</span><div class="bar-bg"><div class="bar" style="width: 76%"></div></div><strong>76%</strong></div>
            <div class="bar-row"><span>临港区</span><div class="bar-bg"><div class="bar" style="width: 69%"></div></div><strong>69%</strong></div>
            <div class="bar-row"><span>中心城区</span><div class="bar-bg"><div class="bar" style="width: 58%"></div></div><strong>58%</strong></div>
          </div>
        </div>
        <div class="card panel">
          <h2>重点推进项目</h2>
          <div class="project-list">
            <div class="project"><div>新能源装备基地<br /><small>签约待落地</small></div><strong>高</strong></div>
            <div class="project"><div>智慧物流园<br /><small>用地协调</small></div><strong>中</strong></div>
            <div class="project"><div>半导体材料项目<br /><small>商务谈判</small></div><strong>高</strong></div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
