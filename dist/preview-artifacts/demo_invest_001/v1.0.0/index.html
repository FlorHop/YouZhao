<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>招商驾驶舱 v1.0.0</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        color: #25333b;
        background: #eef1f3;
        font-family: "PingFang SC", system-ui, sans-serif;
      }
      main { padding: 32px; }
      h1 { margin: 0 0 20px; }
      .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
      .card { padding: 20px; border-radius: 10px; background: #fff; border: 1px solid #d7dde1; }
      span { color: #697984; }
      strong { display: block; margin-top: 12px; font-size: 28px; }
    </style>
  </head>
  <body>
    <main>
      <h1>招商驾驶舱 v1.0.0</h1>
      <section class="cards">
        <div class="card"><span>招商线索</span><strong>286</strong></div>
        <div class="card"><span>在谈项目</span><strong>61</strong></div>
        <div class="card"><span>签约金额</span><strong>98.4亿</strong></div>
        <div class="card"><span>落地项目</span><strong>24</strong></div>
      </section>
    </main>
  </body>
</html>
